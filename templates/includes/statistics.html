<section class="stats-section py-5">

<div class="container">

<div class="row">

{% for stat in statistics %}

<div class="col-lg-3 col-md-6 mb-4">

<div class="stat-card text-center">

<i class="fa-solid {{ stat.icon }}"></i>

<h2>{{ stat.value }}+</h2>

<p>{{ stat.title }}</p>

</div>

</div>

{% endfor %}

</div>

</div>

</section>
