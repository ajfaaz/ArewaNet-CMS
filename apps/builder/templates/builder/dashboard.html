{% extends "cms/base.html" %}

{% block content %}

<h1>Builder</h1>

<table class="table">

    <thead>
        <tr>
            <th>Title</th>
            <th>Slug</th>
            <th>Status</th>
            <th></th>
        </tr>
    </thead>

    <tbody>

        {% for page in pages %}

        <tr>

            <td>{{ page.title }}</td>

            <td>{{ page.slug }}</td>

            <td>{{ page.status }}</td>

            <td>

                <a
                    href="{% url 'builder:page_builder' page.pk %}"
                    class="btn btn-primary btn-sm"
                >
                    Edit
                </a>

            </td>

        </tr>

        {% empty %}

        <tr>

            <td colspan="4">

                No pages yet.

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
